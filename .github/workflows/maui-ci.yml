name: .NET MAUI CI

on:
  push:
    branches:
      - main
      - feature/github-actions-ci
      - feature/ci-automated-tests

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build MAUI Windows App and Run Tests
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore test project
        run: dotnet restore CSVGxpInventoryApp.Tests/CSVGxpInventoryApp.Tests.csproj

      - name: Run automated tests
        run: dotnet test CSVGxpInventoryApp.Tests/CSVGxpInventoryApp.Tests.csproj --configuration Release --no-restore

      - name: Restore Windows target
        run: dotnet restore CSVGxpInventoryApp.csproj -p:TargetFramework=net10.0-windows10.0.19041.0 -r win-x64

      - name: Build Windows target
        run: dotnet build CSVGxpInventoryApp.csproj -f net10.0-windows10.0.19041.0 -r win-x64 -c Release --no-restore -p:WindowsPackageType=None